<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRIS</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── LANDING PAGE SPECIFIC ──────────────────────────────── */

    body {
      /* Yellow-green gradient background — matches Cargo wallpaper */
      background: linear-gradient(160deg,
        #c8cc7a 0%, #d8db9a 30%, #eaea8a 60%, #fff600 100%);
      min-height: 100vh;
    }

    /* Full-viewport centred layout */
    .landing-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
    }

    /* ── BIG HEADING ──────────────────────────────────────────── */
    .landing-heading {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(2.8rem, 8vw, 6rem);
      line-height: 1;
      color: var(--black);
      margin-bottom: 3rem;
    }

    /* ── TWO PILL BUTTONS ─────────────────────────────────────── */
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 3rem;
    }

    /* ── DRAGGABLE ASTERISK IMAGE ─────────────────────────────── */
    .asterisk-wrap {
      width: clamp(180px, 30vw, 340px);
      margin: 1.5rem auto 2rem;
      user-select: none;
      cursor: grab;
    }
    .asterisk-wrap:active { cursor: grabbing; }
    .asterisk-wrap img,
    .asterisk-wrap .placeholder {
      width: 100%;
      aspect-ratio: 0.82;
      object-fit: contain;
    }
    /* Dragging behaviour via JS below */
    .asterisk-wrap { position: relative; }

    /* ── HINT TEXT ────────────────────────────────────────────── */
    .hint {
      font-size: 0.85rem;
      color: var(--black-60);
      letter-spacing: 0.04em;
      margin-top: 1rem;
    }

    /* ── CLOCK (bottom) ───────────────────────────────────────── */
    .clock-bar {
      position: fixed;
      bottom: 1.2rem;
      left: 0; right: 0;
      text-align: center;
      pointer-events: none;
    }

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media (max-width: 600px) {
      .button-row { flex-direction: column; align-items: center; }
      .button-13  { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- ══ LANDING PAGE ══════════════════════════════════════════ -->
  <main class="landing-page">

    <h1 class="landing-heading">
      What do you want to know?
    </h1>

    <div class="button-row">
      <a class="button-13" href="general-ad.html">
        Art Direction &amp; Project Management
      </a>
      <a class="button-13" href="selected-work.html">
        CV &amp; Showreel
      </a>
    </div>

    <!-- Draggable asterisk / star graphic -->
    <!-- TO REPLACE: swap the placeholder div for:
         <img src="images/asterisk.png" alt=""> -->
    <div class="asterisk-wrap" id="dragItem">
      <div class="placeholder" style="aspect-ratio:0.82; border-radius:4px;">
        ✳ image<br><small>asterisk.png</small>
      </div>
    </div>

    <p class="hint">no scrolling here — select an option to continue</p>

  </main>

  <!-- Live clock -->
  <div class="clock-bar">
    <span id="clock"></span>
  </div>

  <script>
    /* ── Live clock ─────────────────────────────────────────── */
    function updateClock() {
      const now = new Date();
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      let h = now.getHours(), m = now.getMinutes();
      const period = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      m = String(m).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()} ${h}:${m} ${period}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ── Draggable asterisk ─────────────────────────────────── */
    const drag = document.getElementById('dragItem');
    let isDragging = false, startX, startY, origX, origY;

    drag.addEventListener('mousedown', e => {
      isDragging = true;
      startX = e.clientX; startY = e.clientY;
      const r = drag.getBoundingClientRect();
      origX = r.left; origY = r.top;
      drag.style.position = 'fixed';
      drag.style.left = origX + 'px';
      drag.style.top  = origY + 'px';
      drag.style.margin = '0';
      drag.style.zIndex = '999';
    });

    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      drag.style.left = (origX + e.clientX - startX) + 'px';
      drag.style.top  = (origY + e.clientY - startY) + 'px';
    });

    document.addEventListener('mouseup', () => { isDragging = false; });
  </script>

</body>
</html>
